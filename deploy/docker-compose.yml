services:
  gateway:
    image: python:3.11-slim
    working_dir: /srv
    command: >
      sh -c "pip install -e . &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    environment:
      MODEL_NAME: qwen3-embedding-8b
      MODEL_PATH: models/Qwen3-Embedding-8B
      VLLM_BASE_URL: http://host.docker.internal:8101/v1
      EMBEDDING_DIM: "4096"
      MAX_INPUT_ITEMS: "256"
      REQUEST_TIMEOUT_SECONDS: "120"
    volumes:
      - ..:/srv
    extra_hosts:
      - "host.docker.internal:host-gateway"

  qdrant:
    image: qdrant/qdrant:v1.11.3
    profiles: ["qdrant"]
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage

volumes:
  qdrant_storage:

